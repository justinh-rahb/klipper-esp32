[mcu esp32_dev]
# Replace this with the stable by-id path for the board's USB-UART bridge.
# The locally tested board reports a Silicon Labs CP2102 with serial 0001.
serial: /dev/serial/by-id/usb-Silicon_Labs_CP2102_USB_to_UART_Bridge_Controller_0001-if00-port0
restart_method: command

[printer]
kinematics: none
max_velocity: 1
max_accel: 1

# Many classic ESP32 development boards have a plain active-high LED on
# GPIO2, but some omit it or wire it elsewhere. Confirm the board schematic
# before enabling this example; GPIO2 is also a boot-strapping pin.
# [output_pin esp32_status]
# pin: esp32_dev:GPIO_NUM_2
# value: 0
# shutdown_value: 0
