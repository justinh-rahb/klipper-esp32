# Minimal, heater-free Klippy connection test for the Panda Breath MCU.
# The ESP32-C3 is the primary [mcu]; no motion; one thermistor read and one
# safe LED output. GPIO18 (heater relay) is deliberately NOT configured, so
# the lockout can never be provoked by the host.

[mcu]
serial: /dev/ttyUSB0
baud: 250000

[printer]
kinematics: none
max_velocity: 100
max_accel: 100

# Chamber NTC on ADC1_CH0 (GPIO0). "Generic 3950" is a built-in sensor type
# in this fork; the repo config's "NTC 100K beta 3950" name is not defined here.
[temperature_sensor chamber_ntc]
sensor_type: Generic 3950
sensor_pin: GPIO_NUM_0
pullup_resistor: 33000
min_temp: -100
max_temp: 350

# PTC NTC on ADC1_CH1 (GPIO1)
[temperature_sensor ptc_ntc]
sensor_type: Generic 3950
sensor_pin: GPIO_NUM_1
pullup_resistor: 33000
min_temp: -100
max_temp: 350

# Safe digital output — button-backlight LED K1 (GPIO6)
[output_pin led_k1]
pin: GPIO_NUM_6
value: 0
shutdown_value: 0
