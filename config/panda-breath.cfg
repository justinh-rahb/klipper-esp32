#
# SAFETY STATUS: the current firmware intentionally rejects heater-on commands.
# This configuration documents the intended final interface; it is not an
# authorization to power the heater before the local PTC/fan interlocks pass
# the hardware validation plan.
#
# Prerequisites:
#   1. From this repository's root, build and flash over USB-C:
#        ./build.sh panda
#        idf.py -B build-esp32c3-panda -p /dev/cu.wchusbserial* flash
#      This profile still locks the relay off; do not flash an unlocked build.
#   2. Connect Panda Breath USB-C to a USB-A port on the Snapmaker U1.
#   3. Find the device path on the U1:
#        ls /dev/ttyUSB*
#   4. Set serial: below to the correct path.
#
# The protocol dictionary is embedded in the image and fetched automatically
# during Klipper identify. No klipper.dict file is copied to the host.
#
# GPIO pin notes:
#   GPIO assignments inferred from ESP32-C3-MINI-1 module datasheet pad layout.
#   GPIO_NTC_CHAMBER (TH0, pad 12 = GPIO0) and GPIO_RELAY (RLY_MOSFET, pad 26 = GPIO18)
#   are high-confidence but continuity testing is recommended before first use.
#   See components/klipper/board_profiles/panda_breath/pins.h.

[mcu panda_breath]
serial: /dev/ttyUSB0    # adjust if needed; check with: ls /dev/ttyUSB*

# Chamber heater — PTC element switched by relay (on/off only). Start with
# watermark control; PID's default 100ms software-PWM cycle is not appropriate
# until the relay's permissible switching rate is confirmed.
[heater_generic chamber]
heater_pin: panda_breath:GPIO_NUM_18    # GPIO_RELAY (module pad 26) — inferred, continuity test recommended
sensor_type: Generic 3950
sensor_pin: panda_breath:GPIO_NUM_0      # GPIO_NTC_CHAMBER (module pad 12) — inferred, continuity test recommended
pullup_resistor: 33000                   # PCB divider is 33K, not Klipper's 4.7K default
control: watermark
max_delta: 1.0
min_temp: 5
max_temp: 70                            # safety headroom; user targets must remain <=60C

# Independent host-visible PTC element sensor. Firmware-local protection must
# still operate without Klippy; this sensor is diagnostic and defense-in-depth.
[temperature_sensor panda_breath_ptc]
sensor_type: Generic 3950
sensor_pin: panda_breath:GPIO_NUM_1
pullup_resistor: 33000
min_temp: 5
max_temp: 120                           # provisional range; calibrate before powered tests

# Klipper thermal safety — required when using heater_generic
[verify_heater chamber]
max_error: 120
check_gain_time: 300    # chamber heats slowly; allow 5 min to reach target
hysteresis: 5
heating_gain: 1
