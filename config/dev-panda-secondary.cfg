# Proper secondary-MCU test: Klipper Linux host process is the PRIMARY [mcu]
# (clock master); the ESP32-C3 Panda Breath is the SECONDARY [mcu panda] and
# syncs its clock to the primary. This exercises the intended role from the
# roadmap. GPIO18 (heater relay) is never configured.

[mcu]
serial: /tmp/klipper_host_mcu

[mcu panda]
serial: /dev/ttyUSB0
baud: 250000

[printer]
kinematics: none
max_velocity: 100
max_accel: 100

# Panda thermistors (pins prefixed with the secondary MCU name)
[temperature_sensor chamber_ntc]
sensor_type: Generic 3950
sensor_pin: panda:GPIO_NUM_0
pullup_resistor: 33000
min_temp: -100
max_temp: 350

[temperature_sensor ptc_ntc]
sensor_type: Generic 3950
sensor_pin: panda:GPIO_NUM_1
pullup_resistor: 33000
min_temp: -100
max_temp: 350

# Safe LED on the panda secondary
[output_pin led_k1]
pin: panda:GPIO_NUM_6
value: 0
shutdown_value: 0
