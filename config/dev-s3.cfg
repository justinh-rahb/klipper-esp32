# Protocol-only configuration for the tested dual-USB-C ESP32-S3 board.
# Copyright (C) 2026 Justin Hayes <justinh@rahb.ca>
# Distributed under the terms of the GNU GPLv3 license.
# The dev profile initializes no product-specific heater or fan pins.

[mcu esp32s3_dev]
# Replace BOARD_ID with the exact entry reported by: ls /dev/serial/by-id/
serial: /dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_<BOARD_ID>-if00
restart_method: command

[printer]
kinematics: none
max_velocity: 1
max_accel: 1

# The original ESP32-S3-DevKitC-1 layout and the tested dual-USB-C clone route
# the onboard addressable RGB LED to GPIO48. Later DevKitC-1 v1.1 boards use
# GPIO38 instead, so confirm the board revision before changing this pin.
[neopixel s3_status]
pin: esp32s3_dev:GPIO_NUM_48
chain_count: 1
color_order: GRB
initial_RED: 0.05
initial_GREEN: 0.05
initial_BLUE: 0.05
