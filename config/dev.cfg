# The dev profile initializes no product-specific heater or fan pins.

[mcu esp32c3_dev]
# Replace BOARD_ID with the exact entry reported by: ls /dev/serial/by-id/
serial: /dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_<BOARD_ID>-if00
restart_method: command

[printer]
kinematics: none
max_velocity: 1
max_accel: 1

# Most dual-USB-C ESP32-C3 DevKitM-style boards connect their onboard WS2812
# to GPIO8. Confirm the board's silkscreen/schematic if this does not light.
[neopixel c3_status]
pin: esp32c3_dev:GPIO_NUM_8
chain_count: 1
color_order: GRB
initial_RED: 0.05
initial_GREEN: 0.05
initial_BLUE: 0.05
